beamline: BTF
namespace: btf
epik8namespace: "apps.okd-datest.lnf.infn.it"
ingressClassName: # OKD doesnt create route if set
targetRevision: "experimental"
token: 6r-MzeKyVxfVnhPAxtpP
serviceAccountName: "default"
## starting point
giturl: https://baltig.infn.it/lnf-da-control/epik8s-btf.git
gitrev: master
baseIp: 172.30.0.0/16
startIp: 1

openshift: true
epicsConfiguration:
  name: "epics-configuration" # name of existing configMap that set CA parameters
  address_list: "193.206.82.124 192.168.189.190 192.168.189.198"
    
  max_array_bytes: "10000000"
  services:
    pvagateway:
      charturl: 'https://baltig.infn.it/epics-containers/ca-gateway-chart.git'
      image:
        repository: baltig.infn.it:4567/epics-containers/docker-pva-gateway
        tag: "latest"
      ingress:
        enabled: false
      loadbalancer: 192.168.36.206
      replicaCount: 1
      exec: start.sh
      auto_security: true
      gitinit: true
      autosync: true ## restart automatically on changes
      staticIp: true
      resources:
            limits:
              cpu: 999m
              memory: 2Gi
            requests:
              cpu: 400m
              memory: 500Mi
      targetRevision: volume-template

    gateway:
      name: "cagateway"
      charturl: 'https://baltig.infn.it/epics-containers/ca-gateway-chart.git'
      ingress:
        enabled: false
      loadbalancer: 192.168.36.203
      replicaCount: 1
      exec: start.sh
      auto_security: true
      gitinit: true
      autosync: true
      staticIp: true

    archiver:
      name: "archiver"
      charturl: 'https://baltig.infn.it/epics-containers/epics-archiver-chart.git'

      replicaCount: 1
      serviceAccount:
        create: false
        name: "default"
      resources:
            limits:
              cpu: 999m
              memory: 5Gi
            requests:
              cpu: 100m
              memory: 4Gi
      storage:
        lts:
          path: /storage/lts
          size: 100Gi
          claim: ""
          accessMode: ReadWriteOnce
        mts:
          path: /storage/mts
          size: 100Gi
          claim: ""
          accessMode: ReadWriteOnce
        sts:
          path: /storage/sts
          size: 10Gi
          claim: ""
          accessMode: ReadWriteOnce
        logs:
          path: /storage/logs
          size: 50Gi
          claim: ""
          accessMode: ReadWriteOnce
      mysql:
            host: mysql
            dbname: arcappl
            user: arcappl
            pass: arcappl
      enable_ingress: true
      securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 1000
      disable: false ## dont deploy

    console: 
        name: "console"
        replicaCount: 1
        charturl: https://baltig.infn.it/epics-containers/epics-console-chart.git
        enable_ingress: true
        gitpath: opi
        gitRepoConfig:
          url: https://baltig.infn.it/lnf-da-control/epik8s-btf.git
          path: opi
          branch: master
        autosync: true
    

    notebook: 
      name: "notebook"
      charturl: https://baltig.infn.it/epics-containers/jupyter-chart.git
      replicaCount: 1
      gitRepoConfig:
        url: https://baltig.infn.it/lnf-da-control/ecs-jupyter-control.git
        path: .
        branch: main
        init: true
      dataVolume:
          claim:  ## an existing claim or empty will create a new one
          size: 5Gi ## size of the claim
          accessMode: ReadWriteOnce
      auto_security: true
      enable_ingress: true
      autosync: false

    olog: 
      name: "olog"
      loglevel: DEBUG
      charturl: https://baltig.infn.it/epics-containers/phoebus-services-chart.git
      phoebusservice: "olog"
      auto_security: true
      enable_ingress: true
      mongodb: "btf-ologAttachments"
      disable: false ##
      
      service:
        loglevel: "DEBUG"
      cors:
        origins: "http://btf-webolog.apps.okd-datest.lnf.infn.it"
      ldap:
        enable: true
        user:
          dn:
            pattern: "uid"
        url: "ldap://ds.infn.it"
        base:
          dn: "ou=People,dc=infn,dc=it"
    
    webolog:
      name: "webolog"
      image:
        repository: "baltig.infn.it:4567/epics-containers/phoebus-olog-web"
        tag: "latest"
        pullPolicy: "Always"
      charturl: https://baltig.infn.it/epics-containers/generic-application-chart.git
      enable_ingress: true
        
      disable: false ##
      env:
        - name: REACT_APP_LEVEL_VALUES
          value: "[\"Urgent\",\"Suggestion\",\"Info\",\"Request\",\"Problem\"]"
        - name: REACT_APP_DEFAULT_LEVEL
          value: "Info"
        - name: REACT_APP_BASE_URL
          value: "http://btf-olog.apps.okd-datest.lnf.infn.it/Olog"
      exec: ## use default
      securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      service:
        ports:
          - name: webolog
            port: 80
            targetport: 3000
            targetname: webolog
            protocol: TCP
            
    saveandrestore: 
      name: "saveandrestore"
      loglevel: DEBUG
      charturl: https://baltig.infn.it/epics-containers/phoebus-services-chart.git
      phoebusservice: "saveandrestore"
      auto_security: true
      enable_ingress: true
      mongodb: "btf-ologAttachments"
      disable: false ##
      usegateway: true
    
    alarmserver: 
      name: "alarmserver"
      loglevel: DEBUG
      charturl: https://baltig.infn.it/epics-containers/phoebus-services-chart.git
      phoebusservice: "alarmserver"
      auto_security: true
      enable_ingress: true
      mongodb: "btf-ologAttachments"
      disable: false ##

    channelfinder: 
      name: "channelfinder"
      loglevel: DEBUG
      charturl: https://baltig.infn.it/epics-containers/channelfinder-chart.git
      auto_security: true
      enable_ingress: true
      mongodb: "btf-ologAttachments"
      disable: false ## 

    scanserver: 
      name: "scanserver"
      loglevel: DEBUG
      charturl: https://baltig.infn.it/epics-containers/phoebus-services-chart.git
      phoebusservice: "scanserver"
      auto_security: true
      enable_ingress: true
      mongodb: "btf-ologAttachments"
      disable: true ## 

    mysql: 
      name: mysql
      charturl: registry-1.docker.io/bitnamicharts
      targetRevision: '9.21.1'
      chart: mysql
      auth:
          rootPassword: "arcappl"
          createDatabase: true
          database: "arcappl"
          username: "arcappl"
          password: "arcappl"
      primary:
        resources:
          limits:
            cpu: 1000m
            memory: 4Gi
          requests:
            cpu: 100m
            memory: 2Gi

      serviceAccount:
        create: false
        name: "default"
      disable: false ## dont deploy

