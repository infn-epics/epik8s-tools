applications:

backend:
  namespace: "backend"
  mongo:
    host: mongodb
    port: 27017
    user:
    pwd:
  elasticsearch:
    host: elasticsearch
    clusterName: elasticsearch
    port: 9200
  kafka:
    host: kafka-headless
    port: 9092
opi:
  camera:
    url: https://baltig.infn.it/infn-epics/camera-opi.git
    main: Camera_Main.bob
    macro:
      - name: "DEVICE"
        value: "{{iocprefix}}"
      - name: "CAM"
        value: "{{iocroot}}"
  dantemag:
    url: https://baltig.infn.it/infn-epics/mag-opi.git
    main: MagnetsTabs.bob
    macro:
      - name: "TITLE"
        value: "MAGTERMINAL {{beamline}}"
      - name: "P"
        value: "{{iocprefix}}"
  motor:
    url: https://github.com/epics-modules/motor.git
    main: "motorApp/op/opi/motorx.opi"
    macro:
      - name: "P"
        value: "{{iocprefix}}"
      - name: "M"
        value: "m0"
  easydriver:
    url: https://baltig.infn.it/infn-epics/caenels-opi.git
    main: "easydriver/easydriver-main.bob"
    macro:
      - name: "P"
        value: "{{iocprefix}}"
      - name: "R"
        value: ""
  icpdas:
    url: https://baltig.infn.it/infn-epics/icpdas-opi.git
    main: "{{devtype}}.bob"
    macro:
      - name: "P"
        value: "{{iocprefix}}"
      - name: "R"
        value: "{{iocroot}}"
  tml:
    url: https://baltig.infn.it/infn-epics/motor-tml-opi.git
    main: TML.bob
    macro:
      - name: "PREFIX"
        value: "{{iocprefix}}"
      - name: "CONFFILE"
        value: "{{CONFIG}}"
  unimag:
    url: https://baltig.infn.it/infn-epics/unimag.git
    main: opi/unimag.bob
    macro:
      - name: "TITLE"
        value: "Unimag {{beamline}}"
      - name: "P"
        value: "{{iocprefix}}"
      - name: "CONFFILE"
        value: "{{CONFIG}}"
        
nfsMounts:
    - name: data
      server: 192.168.197.157
      path: /data_epik8s/btf/data
      mountPath: /nfs/data
      opt: "-o nolock"
    - name: autosave
      server: 192.168.197.157
      path: /data_epik8s/btf/autosave
      mountPath: /nfs/autosave
      opt: "-o nolock"
    - name: config
      server: 192.168.197.157
      path: /data_epik8s/btf/config
      mountPath: /nfs/config
      opt: "-o nolock"

syncPolicy:
    automated:
